<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Timer | CreativeMinds</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a0f;
            --bg-panel: #12121a;
            --accent-gold: #D4AF37;
            --accent-burgundy: #722F37;
            --accent-cyan: #00f0ff;
            --accent-magenta: #ff006e;
            --text-primary: #e8e8e8;
            --text-secondary: #8888a0;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(212, 175, 55, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 175, 55, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow.gold {
            background: var(--accent-gold);
            top: -200px;
            right: -200px;
        }

        .bg-glow.burgundy {
            background: var(--accent-burgundy);
            bottom: -200px;
            left: -200px;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            padding: 2rem;
            width: 100%;
            max-width: 600px;
        }

        .header {
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--accent-gold), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.5rem;
            letter-spacing: 0.05em;
        }

        /* Time Limit Panel */
        .time-limit-panel {
            width: 100%;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.2rem;
            backdrop-filter: blur(10px);
            margin-bottom: 0.5rem;
        }

        .panel-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--accent-gold);
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .panel-title::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent-gold);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-gold);
        }

        .time-inputs {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.8rem;
        }

        .time-inputs input {
            width: 80px;
            padding: 0.8rem;
            background: var(--bg-panel);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1.3rem;
            text-align: center;
            font-variant-numeric: tabular-nums;
            font-weight: 600;
            outline: none;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
        }

        .time-inputs input:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .time-inputs .separator {
            font-size: 1.5rem;
            color: var(--text-secondary);
            font-weight: 300;
        }

        .time-inputs .label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 0.3rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn-set-limit {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(212, 175, 55, 0.1));
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 10px;
            color: var(--accent-gold);
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-set-limit:hover {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.3), rgba(212, 175, 55, 0.2));
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            transform: translateY(-1px);
        }

        /* Timer Circle */
        .timer-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .timer-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .timer-ring-bg {
            fill: none;
            stroke: var(--glass-border);
            stroke-width: 8;
        }

        .timer-ring-progress {
            fill: none;
            stroke: url(#gradient);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 880;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
        }

        .timer-ring-pulse {
            fill: none;
            stroke: var(--accent-gold);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 880;
            stroke-dashoffset: 0;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .timer-ring-pulse.active {
            opacity: 0.3;
            animation: pulse-ring 1s ease-in-out infinite;
        }

        @keyframes pulse-ring {
            0%, 100% { stroke-width: 8; opacity: 0.3; }
            50% { stroke-width: 12; opacity: 0.1; }
        }

        .timer-display {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .time-main {
            font-size: 4rem;
            font-weight: 200;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            line-height: 1;
            font-family: 'Courier New', monospace;
        }

        .time-main.warning {
            color: var(--accent-magenta);
            text-shadow: 0 0 20px rgba(255, 0, 110, 0.5);
            animation: warning-pulse 1s ease-in-out infinite;
        }

        @keyframes warning-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .time-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn {
            position: relative;
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            overflow: hidden;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            backdrop-filter: blur(10px);
            min-width: 120px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            border-color: rgba(255,255,255,0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-start {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.15), rgba(0, 240, 255, 0.05));
            border-color: rgba(0, 240, 255, 0.3);
            color: var(--accent-cyan);
        }

        .btn-start:hover {
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
            border-color: var(--accent-cyan);
        }

        .btn-pause {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(212, 175, 55, 0.05));
            border-color: rgba(212, 175, 55, 0.3);
            color: var(--accent-gold);
        }

        .btn-pause:hover {
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            border-color: var(--accent-gold);
        }

        .btn-stop {
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.15), rgba(255, 0, 110, 0.05));
            border-color: rgba(255, 0, 110, 0.3);
            color: var(--accent-magenta);
        }

        .btn-stop:hover {
            box-shadow: 0 0 30px rgba(255, 0, 110, 0.3);
            border-color: var(--accent-magenta);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .btn:disabled:hover {
            box-shadow: none;
            border-color: var(--glass-border);
        }

        /* Presets */
        .presets {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
            width: 100%;
        }

        .preset-btn {
            padding: 0.75rem 0.5rem;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            background: var(--glass);
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .preset-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            transform: translateY(-2px);
        }

        .preset-btn.active {
            background: rgba(212, 175, 55, 0.2);
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        /* Status */
        .status-bar {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
            transition: all 0.3s;
        }

        .status-indicator.running {
            background: var(--accent-cyan);
            box-shadow: 0 0 10px var(--accent-cyan);
            animation: blink 1s infinite;
        }

        .status-indicator.paused {
            background: var(--accent-gold);
            box-shadow: 0 0 10px var(--accent-gold);
        }

        .status-indicator.stopped {
            background: var(--accent-magenta);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Fullscreen toggle */
        .fullscreen-btn {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            transform: scale(1.1);
        }

        /* Alarm overlay */
        .alarm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 110, 0.1);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 5;
            animation: alarm-flash 0.5s ease-in-out infinite;
        }

        .alarm-overlay.active {
            opacity: 1;
        }

        @keyframes alarm-flash {
            0%, 100% { background: rgba(255, 0, 110, 0.05); }
            50% { background: rgba(255, 0, 110, 0.2); }
        }

        /* Time Up Message */
        .timeup-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: var(--bg-panel);
            border: 2px solid var(--accent-magenta);
            border-radius: 20px;
            padding: 2rem 3rem;
            text-align: center;
            z-index: 20;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 0 60px rgba(255, 0, 110, 0.4);
            pointer-events: none;
        }

        .timeup-message.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: all;
        }

        .timeup-message h2 {
            font-size: 2.5rem;
            color: var(--accent-magenta);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(255, 0, 110, 0.5);
        }

        .timeup-message p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .timeup-message .btn-dismiss {
            margin-top: 1.5rem;
            padding: 0.8rem 2rem;
            background: var(--accent-magenta);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .timeup-message .btn-dismiss:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.4);
        }

        /* Keyboard hint */
        .keyboard-hints {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1.5rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .keyboard-hints:hover {
            opacity: 1;
        }

        .key {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            background: var(--bg-panel);
            border: 1px solid var(--glass-border);
            border-radius: 4px;
            font-family: monospace;
            margin-right: 0.3rem;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .timer-wrapper {
                width: 260px;
                height: 260px;
            }
            .time-main {
                font-size: 3.5rem;
            }
            .presets {
                grid-template-columns: repeat(3, 1fr);
            }
            .controls {
                flex-wrap: wrap;
                justify-content: center;
            }
            .timeup-message h2 {
                font-size: 1.8rem;
            }
        }
    </style>
<base target="_blank">

<body>
    <div class="bg-grid"></div>
    <div class="bg-glow gold"></div>
    <div class="bg-glow burgundy"></div>
    <div class="alarm-overlay" id="alarmOverlay"></div>

    <div class="timeup-message" id="timeupMessage">
        <h2>Time's Up!</h2>
        <p>Activity time limit reached</p>
        <button class="btn-dismiss" id="dismissBtn">Dismiss</button>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn" title="Toggle Fullscreen">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
    </button>

    <div class="container">
        <div class="header">
            <h1>Class Timer</h1>
            <p>Set time limit · Start · Pause · Stop</p>
        </div>

        <!-- Time Limit Setting Panel -->
        <div class="time-limit-panel">
            <div class="panel-title">Set Time Limit</div>
            <div class="time-inputs">
                <div class="input-group">
                    <input type="number" id="customMin" min="0" max="99" value="5" placeholder="00">
                    <span class="label">Minutes</span>
                </div>
                <span class="separator">:</span>
                <div class="input-group">
                    <input type="number" id="customSec" min="0" max="59" value="0" placeholder="00">
                    <span class="label">Seconds</span>
                </div>
            </div>
            <button class="btn-set-limit" id="setBtn">Apply Time Limit</button>
        </div>

        <div class="timer-wrapper">
            <svg class="timer-ring" viewBox="0 0 300 300">
                <defs>
                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent-gold);stop-opacity:1" />
                        <stop offset="100%" style="stop-color:var(--accent-burgundy);stop-opacity:1" />
                    </linearGradient>
                </defs>
                <circle class="timer-ring-bg" cx="150" cy="150" r="140"/>
                <circle class="timer-ring-progress" id="progressRing" cx="150" cy="150" r="140"/>
                <circle class="timer-ring-pulse" id="pulseRing" cx="150" cy="150" r="140"/>
            </svg>
            <div class="timer-display">
                <div class="time-main" id="timeDisplay">05:00</div>
                <div class="time-label" id="timeLabel">Time Limit Set</div>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-indicator" id="statusIndicator"></div>
            <span id="statusText">Ready</span>
        </div>

        <div class="controls">
            <button class="btn btn-start" id="startBtn">Start</button>
            <button class="btn btn-pause" id="pauseBtn" disabled>Pause</button>
            <button class="btn btn-stop" id="stopBtn" disabled>Stop</button>
        </div>

        <div class="presets">
            <button class="preset-btn" data-min="1">1 min</button>
            <button class="preset-btn" data-min="5">5 min</button>
            <button class="preset-btn" data-min="10">10 min</button>
            <button class="preset-btn" data-min="15">15 min</button>
            <button class="preset-btn" data-min="30">30 min</button>
        </div>
    </div>

    <div class="keyboard-hints">
        <span><span class="key">Space</span> Start/Pause</span>
        <span><span class="key">S</span> Stop</span>
        <span><span class="key">R</span> Reset</span>
        <span><span class="key">F</span> Fullscreen</span>
    </div>

    <script>
        // Timer State
        let totalSeconds = 300; // Default 5 minutes
        let remainingSeconds = 300;
        let intervalId = null;
        let isRunning = false;
        let isPaused = false;

        // DOM Elements
        const timeDisplay = document.getElementById('timeDisplay');
        const timeLabel = document.getElementById('timeLabel');
        const progressRing = document.getElementById('progressRing');
        const pulseRing = document.getElementById('pulseRing');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const setBtn = document.getElementById('setBtn');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const alarmOverlay = document.getElementById('alarmOverlay');
        const timeupMessage = document.getElementById('timeupMessage');
        const dismissBtn = document.getElementById('dismissBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const customMin = document.getElementById('customMin');
        const customSec = document.getElementById('customSec');

        // Audio Context for alarm
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // School bell style alarm
        function playAlarm() {
            initAudio();
            const now = audioCtx.currentTime;
            
            // Bell pattern: ding-ding-ding-dong
            const notes = [
                { freq: 880, time: 0, duration: 0.6 },
                { freq: 880, time: 0.4, duration: 0.6 },
                { freq: 880, time: 0.8, duration: 0.6 },
                { freq: 698, time: 1.4, duration: 1.2 }
            ];

            notes.forEach(note => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(note.freq, now + note.time);
                
                // Bell envelope
                gain.gain.setValueAtTime(0, now + note.time);
                gain.gain.linearRampToValueAtTime(0.4, now + note.time + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, now + note.time + note.duration);
                
                osc.start(now + note.time);
                osc.stop(now + note.time + note.duration);
            });

            // Second round after 2 seconds
            setTimeout(() => {
                const now2 = audioCtx.currentTime;
                const notes2 = [
                    { freq: 880, time: 0, duration: 0.6 },
                    { freq: 880, time: 0.4, duration: 0.6 },
                    { freq: 698, time: 1.0, duration: 1.5 }
                ];
                
                notes2.forEach(note => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(note.freq, now2 + note.time);
                    gain.gain.setValueAtTime(0, now2 + note.time);
                    gain.gain.linearRampToValueAtTime(0.4, now2 + note.time + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.01, now2 + note.time + note.duration);
                    osc.start(now2 + note.time);
                    osc.stop(now2 + note.time + note.duration);
                });
            }, 2200);
        }

        // SVG Circle circumference = 2 * PI * 140 ≈ 880
        const CIRCUMFERENCE = 880;

        function updateDisplay() {
            const minutes = Math.floor(remainingSeconds / 60);
            const seconds = remainingSeconds % 60;
            timeDisplay.textContent = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

            // Update ring progress
            if (totalSeconds > 0) {
                const offset = CIRCUMFERENCE - (remainingSeconds / totalSeconds) * CIRCUMFERENCE;
                progressRing.style.strokeDashoffset = offset;
            } else {
                progressRing.style.strokeDashoffset = 0;
            }

            // Warning state under 30 seconds
            if (remainingSeconds <= 30 && remainingSeconds > 0 && isRunning) {
                timeDisplay.classList.add('warning');
                pulseRing.classList.add('active');
            } else {
                timeDisplay.classList.remove('warning');
                pulseRing.classList.remove('active');
            }
        }

        function setTime(seconds) {
            // Stop any running timer first
            clearInterval(intervalId);
            isRunning = false;
            isPaused = false;
            
            totalSeconds = seconds;
            remainingSeconds = seconds;
            updateDisplay();
            
            timeLabel.textContent = 'Time Limit Set';
            resetStatus();
            
            // Reset buttons
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            stopBtn.disabled = true;
            
            // Clear active preset
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        }

        function resetStatus() {
            statusIndicator.className = 'status-indicator';
            statusText.textContent = 'Ready';
            alarmOverlay.classList.remove('active');
            timeDisplay.classList.remove('warning');
            pulseRing.classList.remove('active');
            timeupMessage.classList.remove('show');
        }

        function startTimer() {
            if (remainingSeconds === 0) return;
            
            initAudio();
            isRunning = true;
            isPaused = false;
            
            startBtn.disabled = true;
            pauseBtn.disabled = false;
            stopBtn.disabled = false;
            
            statusIndicator.className = 'status-indicator running';
            statusText.textContent = 'Running';
            timeLabel.textContent = 'Time Remaining';
            
            intervalId = setInterval(() => {
                remainingSeconds--;
                updateDisplay();
                
                if (remainingSeconds <= 0) {
                    completeTimer();
                }
            }, 1000);
        }

        function pauseTimer() {
            if (!isRunning) return;
            
            clearInterval(intervalId);
            isRunning = false;
            isPaused = true;
            
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            
            statusIndicator.className = 'status-indicator paused';
            statusText.textContent = 'Paused';
            timeLabel.textContent = 'Paused';
        }

        function stopTimer() {
            clearInterval(intervalId);
            isRunning = false;
            isPaused = false;
            remainingSeconds = totalSeconds;
            
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            stopBtn.disabled = true;
            
            updateDisplay();
            resetStatus();
            timeLabel.textContent = 'Time Limit Set';
        }

        function completeTimer() {
            clearInterval(intervalId);
            isRunning = false;
            isPaused = false;
            remainingSeconds = 0;
            
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            stopBtn.disabled = true;
            
            statusIndicator.className = 'status-indicator stopped';
            statusText.textContent = 'Time Up';
            timeLabel.textContent = 'Completed';
            
            // Visual alarm
            alarmOverlay.classList.add('active');
            timeupMessage.classList.add('show');
            
            // Sound alarm
            playAlarm();
        }

        // Event Listeners
        startBtn.addEventListener('click', () => {
            if (isPaused || !isRunning) {
                startTimer();
            }
        });

        pauseBtn.addEventListener('click', pauseTimer);
        stopBtn.addEventListener('click', stopTimer);

        setBtn.addEventListener('click', () => {
            const mins = parseInt(customMin.value) || 0;
            const secs = parseInt(customSec.value) || 0;
            const total = (mins * 60) + secs;
            if (total > 0) {
                setTime(total);
            }
        });

        dismissBtn.addEventListener('click', () => {
            timeupMessage.classList.remove('show');
            alarmOverlay.classList.remove('active');
            stopTimer();
        });

        // Preset buttons
        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const mins = parseInt(btn.dataset.min);
                setTime(mins * 60);
                
                // Update active state
                document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // Update custom inputs to match
                customMin.value = mins;
                customSec.value = 0;
            });
        });

        // Fullscreen
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Keyboard Shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') {
                if (e.code === 'Enter') {
                    setBtn.click();
                    e.target.blur();
                }
                return;
            }
            
            switch(e.code) {
                case 'Space':
                    e.preventDefault();
                    if (isRunning) {
                        pauseTimer();
                    } else {
                        startTimer();
                    }
                    break;
                case 'KeyS':
                    stopTimer();
                    break;
                case 'KeyR':
                    stopTimer();
                    break;
                case 'KeyF':
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen();
                    } else {
                        document.exitFullscreen();
                    }
                    break;
                case 'Escape':
                    timeupMessage.classList.remove('show');
                    alarmOverlay.classList.remove('active');
                    break;
            }
        });

        // Initialize
        updateDisplay();
    </script>
</body>
</html>
