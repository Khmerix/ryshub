            text-transform: uppercase;

            font-weight: bold;

        .book-nav-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;

        .book-nav a, .book-nav button {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(145deg, #8b3a3a 0%, #722f37 50%, #5c1a1a 100%);
            cursor: pointer;
            border: none;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 4px 6px rgba(0, 0, 0, 0.2),
                0 2px 4px rgba(114, 47, 55, 0.3),
                inset 0 1px 0 rgba(255,255,255,0.15),
                inset 0 -2px 0 rgba(0,0,0,0.2);
            transform: translateY(0);
        }

        .book-nav a::before, .book-nav button::before {
            content: '';
            position: absolute;
            inset-block-start: 0;
            inset-inline-start: -100%;
            inline-size: 100%;
            block-size: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .book-nav a:hover::before, .book-nav button:hover::before {
            inset-inline-start: 100%;
        }

        .book-nav a:hover, .book-nav button:hover { 
            background: linear-gradient(145deg, #d4af37 0%, #e5c76b 50%, #d4af37 100%);
            color: #722f37;
            transform: translateY(-3px) scale(1.05);
            box-shadow: 
                0 8px 15px rgba(212, 175, 55, 0.4),
                0 4px 8px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255,255,255,0.3),
                inset 0 -2px 0 rgba(0,0,0,0.1);
        }
        
        .book-nav a.active, .book-nav button.active { 
            background: linear-gradient(145deg, #d4af37 0%, #e5c76b 50%, #b8960c 100%);
            color: #722f37;
            box-shadow: 
                0 4px 8px rgba(212, 175, 55, 0.4),
                0 0 15px rgba(212, 175, 55, 0.5),
                inset 0 1px 0 rgba(255,255,255,0.4),
                inset 0 -2px 0 rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        
        .book-nav a:active, .book-nav button:active {
            transform: translateY(-1px) scale(0.98);
